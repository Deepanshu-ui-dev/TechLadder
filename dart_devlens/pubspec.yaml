name: dart_devlens
description: >
  A live debug overlay for Flutter apps. Shows widget rebuild counts,
  frame performance, state change logs, and a tap inspector — all floating
  on top of your running app. Zero config, zero production overhead.
version: 0.1.0
homepage: https://github.com/yourname/dart_devlens

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
